name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    name: Build & test (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # net8.0 targeting pack + a newer SDK that understands the .slnx solution format.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore RDPeek.slnx

      - name: Build
        run: dotnet build RDPeek.slnx -c Release --no-restore

      - name: Test
        run: dotnet test RDPeek.slnx -c Release --no-build --verbosity normal

  publish:
    name: Publish tools (win-x64)
    runs-on: windows-latest
    needs: build-test
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Publish rdpeek-doctor
        run: >
          dotnet publish src/Rdpeek.Doctor -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/doctor

      - name: Publish rdpeek-agent
        run: >
          dotnet publish src/Rdpeek.Agent -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/agent

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rdpeek-tools-win-x64
          path: |
            publish/doctor/rdpeek-doctor.exe
            publish/agent/rdpeek-agent.exe
          if-no-files-found: error
